<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="login-page" id="login-page">
    <div class="login-card">
      <h1>Mini Admin</h1>
      <p>Sign in to your account</p>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="admin@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••" autocomplete="current-password">
        </div>
        <div class="form-error" id="login-error" style="margin-bottom:12px"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <div class="app" id="app-page">
    <header class="header">
      <div class="header-left">
        <span class="header-logo">Mini Admin</span>
        <span class="header-sep">/</span>
        <span class="header-section">Users</span>
      </div>
      <div class="header-right">
        <span class="header-user" id="header-user"></span>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
      </div>
    </header>
    <main class="main" id="content"></main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Confirm</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="confirm-text" id="confirm-text"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
