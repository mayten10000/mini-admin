version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-miniadmin}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-miniadmin}"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_NAME:-miniadmin}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrator}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE: ${OPENROUTER_BASE:-https://openrouter.ai/api/v1}
      AI_MODEL: ${AI_MODEL:-google/gemini-2.0-flash-001}
      AI_MAX_USERS: ${AI_MAX_USERS:-100}
      AI_TIMEOUT: ${AI_TIMEOUT:-60s}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
